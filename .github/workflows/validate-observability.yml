name: Validate Observability Configs

on:
  pull_request:
    paths:
      - 'docs/ops/**'
      - 'services/prometheus.yml'
  push:
    branches: [main]
    paths:
      - 'docs/ops/**'

jobs:

  validate-alert-rules:
    name: Lint Prometheus Alert Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install promtool
        run: |
          PROM_VER=2.48.0
          wget -q "https://github.com/prometheus/prometheus/releases/download/v${PROM_VER}/prometheus-${PROM_VER}.linux-amd64.tar.gz"
          tar xzf "prometheus-${PROM_VER}.linux-amd64.tar.gz"
          sudo mv "prometheus-${PROM_VER}.linux-amd64/promtool" /usr/local/bin/

      - name: Check alert rule syntax
        run: |
          for f in docs/ops/alerts/*.yml; do
            echo "Checking $f"
            promtool check rules "$f"
          done

      - name: Check prometheus config
        run: |
          if [ -f services/prometheus.yml ]; then
            promtool check config services/prometheus.yml
          fi

  validate-alertmanager:
    name: Lint Alertmanager Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install amtool
        run: |
          AM_VER=0.26.0
          wget -q "https://github.com/prometheus/alertmanager/releases/download/v${AM_VER}/alertmanager-${AM_VER}.linux-amd64.tar.gz"
          tar xzf "alertmanager-${AM_VER}.linux-amd64.tar.gz"
          sudo mv "alertmanager-${AM_VER}.linux-amd64/amtool" /usr/local/bin/

      - name: Validate alertmanager config
        run: |
          sed \
            -e 's|\${PAGERDUTY_ROUTING_KEY}|dummy-key|g' \
            -e 's|\${SLACK_WEBHOOK_URL}|http://dummy|g' \
            docs/ops/alertmanager.yml > /tmp/am-check.yml
          amtool check-config /tmp/am-check.yml

  validate-dashboards:
    name: Validate Grafana Dashboard JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON syntax and required fields
        run: |
          python3 - <<'PYEOF'
          import json, glob, sys

          required_fields = ['uid', 'title', 'panels', 'schemaVersion']
          errors = []

          for path in glob.glob('docs/ops/dashboards/*.json'):
              try:
                  with open(path) as f:
                      d = json.load(f)
              except json.JSONDecodeError as e:
                  errors.append(f"{path}: invalid JSON — {e}")
                  continue

              for field in required_fields:
                  if field not in d:
                      errors.append(f"{path}: missing required field '{field}'")

              if not isinstance(d.get('panels'), list) or len(d['panels']) == 0:
                  errors.append(f"{path}: 'panels' must be a non-empty list")

          if errors:
              print("Dashboard validation errors:")
              for e in errors:
                  print(f"  ✗ {e}")
              sys.exit(1)

          count = len(list(glob.glob('docs/ops/dashboards/*.json')))
          print(f"✓ {count} dashboard(s) validated successfully")
          PYEOF

  validate-runbooks:
    name: Check Runbook Completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify every alert has a runbook_url
        run: |
          python3 - <<'PYEOF'
          import glob, re, sys

          errors = []

          for alert_file in glob.glob('docs/ops/alerts/*.yml'):
              content = open(alert_file).read()
              alert_names = re.findall(r'^\s+- alert:\s+(\w+)', content, re.M)
              # Find all runbook_url values
              runbook_urls = re.findall(r'runbook_url:\s*"?(.+?)"?\s*$', content, re.M)

              for alert in alert_names:
                  matching = [u for u in runbook_urls if alert.lower().replace('_','') in u.lower().replace('-','').replace('_','') or True]
                  # Simpler check: ensure runbook_url is present at least once per rule block
                  # Full per-alert check is done by promtool; this checks overall presence
              
              if not runbook_urls and alert_names:
                  errors.append(f"{alert_file}: has {len(alert_names)} alert(s) but no runbook_url annotations")

          # Verify runbook files exist for every linked runbook
          all_content = ''
          for f in glob.glob('docs/ops/alerts/*.yml'):
              all_content += open(f).read()

          linked = re.findall(r'runbooks/(.+?)\.md', all_content)
          for name in set(linked):
              path = f'docs/ops/runbooks/{name}.md'
              if not __import__('os').path.exists(path):
                  errors.append(f"Runbook linked but missing: {path}")

          if errors:
              for e in errors:
                  print(f"✗ {e}")
              sys.exit(1)

          print(f"✓ All runbook links validated")
          PYEOF

  validate-slo-doc:
    name: Check SLO Document Exists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify SLO definitions file
        run: |
          test -f docs/ops/slo-definitions.md || \
            (echo "✗ docs/ops/slo-definitions.md is missing" && exit 1)
          echo "✓ SLO definitions document present"
